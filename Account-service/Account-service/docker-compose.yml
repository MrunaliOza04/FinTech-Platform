version: '4'

services:
  mongodb:
    image: mongo:7.0.5
    container_name: mongodbAccount
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: account-service
    volumes:
      - ./data:/data/db