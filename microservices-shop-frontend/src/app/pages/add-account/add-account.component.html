<div class="container mx-auto p-4">
  <h2 class="text-2xl font-bold mb-4">Create Account</h2>

  @if (accountCreated) {
  <h4 class="text-green-500">
    Account Created Successfully
  </h4>
  }

  <form [formGroup]="createAccountForm" (ngSubmit)="onSubmit()">

    <!-- Account Number -->
    <div class="mb-4">
      <label class="block text-gray-700" for="accountNumber">
        Account Number
      </label>

      <input
        type="text"
        id="accountNumber"
        formControlName="accountNumber"
        class="border rounded w-full py-2 px-3 text-gray-700"
      />

      <div
        *ngIf="accountNumber?.invalid &&
              (accountNumber?.dirty || accountNumber?.touched)"
        class="text-red-500">

        <div *ngIf="accountNumber?.errors?.['required']">
          Account Number is required.
        </div>

      </div>
    </div>

    <!-- Customer Name -->
    <div class="mb-4">
      <label class="block text-gray-700" for="customerName">
        Customer Name
      </label>

      <input
        type="text"
        id="customerName"
        formControlName="customerName"
        class="border rounded w-full py-2 px-3 text-gray-700"
      />

      <div
        *ngIf="customerName?.invalid &&
              (customerName?.dirty || customerName?.touched)"
        class="text-red-500">

        <div *ngIf="customerName?.errors?.['required']">
          Customer Name is required.
        </div>

      </div>
    </div>

    <!-- Account Type -->
    <div class="mb-4">
      <label class="block text-gray-700" for="accountType">
        Account Type
      </label>

      <select
        id="accountType"
        formControlName="accountType"
        class="border rounded w-full py-2 px-3 text-gray-700">

        <option value="">Select Account Type</option>
        <option value="Savings">Savings</option>
        <option value="Current">Current</option>

      </select>
    </div>

    <!-- Balance -->
    <div class="mb-4">
      <label class="block text-gray-700" for="balance">
        Initial Balance
      </label>

      <input
        type="number"
        id="balance"
        formControlName="balance"
        class="border rounded w-full py-2 px-3 text-gray-700"
      />

      <div
        *ngIf="balance?.invalid &&
              (balance?.dirty || balance?.touched)"
        class="text-red-500">

        <div *ngIf="balance?.errors?.['required']">
          Balance is required.
        </div>

      </div>
    </div>

    <button
      type="submit"
      class="bg-green-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600"
      [disabled]="createAccountForm.invalid">

      Create Account

    </button>

  </form>

</div>
