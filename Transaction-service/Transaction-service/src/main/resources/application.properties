spring.application.name=transaction-service

spring.datasource.url=jdbc:mysql://localhost:3308/transaction_service
spring.datasource.username=root
spring.datasource.password=mysql123

spring.jpa.hibernate.ddl-auto=none

server.port=8081
balance.url=http://localhost:8082
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# ===================================================================
# ACTUATOR & MONITORING
# ===================================================================
management.health.circuitbreakers.enabled=true
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# ===================================================================
# RESILIENCE4J SETUP (Instance name: balance)
# ===================================================================
resilience4j.circuitbreaker.instances.balance.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.balance.slidingWindowType=COUNT_BASED
resilience4j.circuitbreaker.instances.balance.slidingWindowSize=10
resilience4j.circuitbreaker.instances.balance.failureRateThreshold=50
resilience4j.circuitbreaker.instances.balance.waitDurationInOpenState=5s
resilience4j.circuitbreaker.instances.balance.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.balance.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.instances.balance.minimum-number-of-calls=5

# Matching time limits and retry operations
resilience4j.timelimiter.instances.balance.timeout-duration=3s

resilience4j.retry.instances.balance.max-attempts=3
resilience4j.retry.instances.balance.wait-duration=2s