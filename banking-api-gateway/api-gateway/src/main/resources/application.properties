spring.application.name=banking-api-gateway
server.port=10000

account.service.url=http://localhost:8080
transaction.service.url=http://localhost:8081
balance.service.url=http://localhost:8082

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8181/realms/spring-microservices-security-realm
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.urls[0].name=Account Service
springdoc.swagger-ui.urls[0].url=/aggregate/account-service/v3/api-docs
springdoc.swagger-ui.urls[1].name=Transaction Service
springdoc.swagger-ui.urls[1].url=/aggregate/transaction-service/v3/api-docs
springdoc.swagger-ui.urls[2].name=Balance Service
springdoc.swagger-ui.urls[2].url=/aggregate/balance-service/v3/api-docs

management.health.circuitbreakers.enabled=true
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

resilience4j.circuitbreaker.configs.default.registerHealthIndicator=true
resilience4j.circuitbreaker.configs.default.slidingWindowType=COUNT_BASED
resilience4j.circuitbreaker.configs.default.slidingWindowSize=10 
resilience4j.circuitbreaker.configs.default.failureRateThreshold=50
resilience4j.circuitbreaker.configs.default.waitDurationInOpenState=5s
resilience4j.circuitbreaker.configs.default.permittedNumberOfCallsInHalfOpenState=3 
resilience4j.circuitbreaker.configs.default.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.configs.default.minimum-number-of-calls=5

resilience4j.timelimiter.configs.default.timeout-duration=3s

resilience4j.retry.configs.default.max-attempts=3
resilience4j.retry.configs.default.wait-duration=2s

resilience4j.circuitbreaker.instances.accountServiceCircuitBreaker.registerHealthIndicator=true

resilience4j.circuitbreaker.instances.transactionServiceSwaggerCircuitBreaker.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.balanceServiceSwaggerCircuitBreaker.registerHealthIndicator=true